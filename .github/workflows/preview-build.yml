name: Preview Build

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install

      - name: Build Chrome extension
        run: yarn build
        env:
          VITE_AUTH_HOST_URL: ${{ secrets.VITE_AUTH_HOST_URL }}
          VITE_DRIVE_API_URL: ${{ secrets.VITE_DRIVE_API_URL }}
          VITE_IP_API_URL: ${{ secrets.VITE_IP_API_URL }}
          VITE_VPN_API_URL: ${{ secrets.VITE_VPN_API_URL }}
          VITE_VPN_PASSWORD: ${{ secrets.VITE_VPN_PASSWORD }}
          VITE_VPN_SERVER_ADDRESS: ${{ secrets.VITE_VPN_SERVER_ADDRESS }}
          VITE_VPN_SERVER_PORT: ${{ secrets.VITE_VPN_SERVER_PORT }}
          VITE_VPN_USERNAME: ${{ secrets.VITE_VPN_USERNAME }}

      - name: Create Chrome ZIP
        run: yarn zip

      - name: Upload Chrome build artifact
        uses: actions/upload-artifact@v4
        with:
          name: inxt-vpn-chrome-preview
          path: .output/*.zip
          retention-days: 30

      - name: Comment PR with download links
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const runId = context.runId;
            const repo = context.repo;

            const comment = `## 🎉 Preview Build Ready!

            Your extension builds are ready for testing:

            ### Chrome
            📦 [Download Chrome Extension](https://github.com/${repo.owner}/${repo.repo}/actions/runs/${runId})


            #### How to test:

            **Chrome:**
            1. Download the Chrome artifact from the links above
            2. Unzip the file
            3. Go to \`chrome://extensions/\`
            4. Enable "Developer mode"
            5. Click "Load unpacked" and select the unzipped folder

            ⏱️ Artifacts will be available for 30 days.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: repo.owner,
              repo: repo.repo,
              body: comment
            });
